# ParkGo — HTTP only (use BEFORE Let's Encrypt certificates exist)
# After the site works on port 80, run Certbot to add HTTPS (see deploy/ENABLE-HTTPS.md)

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    root /var/www/parkgo/build;
    index index.html;

    access_log /var/log/nginx/parkgo_access.log;
    error_log  /var/log/nginx/parkgo_error.log;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location ~ /\. {
        deny all;
    }

    location ~ ^/(api|auth|reservations|slots|admin|gate|paymob|health|uploads)/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
